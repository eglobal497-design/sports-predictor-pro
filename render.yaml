services:
  - type: web
    name: sports-predictor-pro
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: RAPIDAPI_KEY
        sync: false
      - key: RAPIDAPI_HOST
        value: api-football-v1.p.rapidapi.com
      - key: THEODDS_API_KEY
        sync: false
      - key: FOOTBALL_API_KEY
        sync: false